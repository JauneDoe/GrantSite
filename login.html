<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Access</title>
    <meta name="description" content="Private owner access for site updates." />
    <link rel="stylesheet" href="styles.css" />
    <!-- Firebase SDK (compat mode for global firebase namespace) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <!-- Firebase Configuration and Helpers -->
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-database.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="logo" href="index.html">
          <span class="logo-mark">2SC</span>
          <span class="logo-text">2xclusive Solutions Consulting, LLC</span>
        </a>
        <div class="nav-actions">
          <a class="button button-ghost" href="index.html">Back to Home</a>
        </div>
      </nav>
    </header>

    <main class="section">
      <div class="section-heading">
        <h2>Sign in</h2>
        <p>Access your account to manage requests, messages, and updates.</p>
      </div>

      <form class="card contact-form" id="login-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: -0.5rem; margin-bottom: 1rem;">
          <button id="forgot-password-btn" type="button" style="background: none; border: 0; padding: 0; color: var(--primary); font: inherit; font-size: 0.9rem; cursor: pointer; text-decoration: underline;">
            Forgot password?
          </button>
        </div>
        <button class="button button-primary" type="submit">Sign in</button>
        <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
        
        <div class="donor-access-link" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
          <p style="margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--muted);">Need an account?</p>
          <a href="client-register.html" class="button button-ghost" style="width: 100%;">Create Account</a>
        </div>
      </form>
    </main>

    <script>
      // Single unified sign-in flow for owner/client roles.
      // The app distinguishes owner by specific admin email, otherwise client.

      const form = document.getElementById("login-form");
      const error = document.getElementById("login-error");
      const forgotPasswordBtn = document.getElementById("forgot-password-btn");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = form.email.value.trim();
        const password = form.password.value.trim();

        error.style.color = "#dc2626";
        error.textContent = "";

        const result = await signInUser(email, password);
        if (!result.success) {
          error.textContent = "Login failed: " + result.error;
          return;
        }

        if (result.role === "client") {
          window.location.href = "client-dashboard.html";
        } else if (result.role === "owner") {
          window.location.href = "owner.html";
        } else {
          window.location.href = "client-dashboard.html";
        }
      });

      forgotPasswordBtn.addEventListener("click", async () => {
        const email = form.email.value.trim();

        if (!email) {
          error.style.color = "#dc2626";
          error.textContent = "Enter your email address first, then select Forgot password.";
          form.email.focus();
          return;
        }

        error.style.color = "#334155";
        error.textContent = "Sending password reset email...";

        const result = await resetPassword(email);
        if (!result.success) {
          error.style.color = "#dc2626";
          error.textContent = "Password reset failed: " + result.error;
          return;
        }

        error.style.color = "#16a34a";
        error.textContent = "Password reset email sent. Check your inbox and spam folder.";
      });
    </script>
  </body>
</html>
