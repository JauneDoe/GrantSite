<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Access</title>
    <meta name="description" content="Private owner access for site updates." />
    <link rel="stylesheet" href="styles.css" />
    <!-- Firebase SDK (compat mode for global firebase namespace) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <!-- Firebase Configuration and Helpers -->
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-database.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="logo" href="index.html">
          <span class="logo-mark">2SC</span>
          <span class="logo-text">2xclusive Solutions Consulting, LLC</span>
        </a>
        <div class="nav-actions">
          <a class="button button-ghost" href="index.html">Back to Home</a>
        </div>
      </nav>
    </header>

    <main class="section">
      <div class="section-heading">
        <h2>Owner access</h2>
        <p>Sign in to update site content. This is temporary and will be upgraded later.</p>
      </div>

      <form class="card contact-form" id="login-form">
        <div class="form-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="button button-primary" type="submit">Sign in</button>
        <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
        
        <div class="donor-access-link" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
          <p style="margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--muted);">Current Client?</p>
          <a href="client-register.html" class="button button-ghost" style="width: 100%;">Create Account</a>
        </div>
      </form>

      <div style="margin-top: 2rem; padding: 1.5rem; border: 1px solid var(--border); border-radius: 12px; background: #fff;">
        <h3 style="margin-bottom: 1rem;">Client Login</h3>
        <form id="client-login-form" class="contact-form">
          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </div>
          <button class="button button-primary" type="submit">Sign in as Client</button>
          <p id="client-login-error" role="alert" style="color:#dc2626; margin-top: 0.5rem;"></p>
        </form>
      </div>
    </main>

    <script>
      // Owner auth is currently handled with hardcoded username/password and not sessionStorage.
      // Client auth is managed by Firebase Auth state.

      const OWNER_USERNAME = "Owner";
      const OWNER_PASSWORD = "Easyas123";

      const form = document.getElementById("login-form");
      const error = document.getElementById("login-error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = form.username.value.trim();
        const password = form.password.value.trim();

        if (username === OWNER_USERNAME && password === OWNER_PASSWORD) {
          sessionStorage.setItem("ownerAccess", "granted");
          window.location.href = "owner.html";
          return;
        }

        error.textContent = "Incorrect username or password.";
      });

      const clientForm = document.getElementById("client-login-form");
      const clientError = document.getElementById("client-login-error");

      clientForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = clientForm.email.value.trim();
        const password = clientForm.password.value.trim();

        const result = await signInUser(email, password);
        if (!result.success) {
          clientError.textContent = "Login failed: " + result.error;
          return;
        }

        window.location.href = "client-dashboard.html";
      });
    </script>
  </body>
</html>
